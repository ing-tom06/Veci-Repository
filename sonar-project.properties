sonar.projectKey=veci-app
sonar.projectName=AppVeci
sonar.projectVersion=1.0

# SonarQube server URL
sonar.host.url=http://localhost:9000

# Source and Test paths
sonar.sources=backend,frontend/src
sonar.tests=backend,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.spec.ts

# Exclusions from source scanning (excludes tests and dependencies)
sonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/*.spec.ts,**/*.test.js,frontend/src/environments/**,frontend/src/assets/**

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report configurations
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

