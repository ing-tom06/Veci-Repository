<div class="notif-wrapper">
  <!-- Botón campana -->
  <button class="notif-btn" (click)="togglePanel()" [class.has-unread]="noLeidas > 0" title="Notificaciones">
    <span class="notif-icon">🔔</span>
    <span class="notif-badge" *ngIf="noLeidas > 0">{{ noLeidas > 9 ? '9+' : noLeidas }}</span>
  </button>

  <!-- Panel desplegable -->
  <div class="notif-panel" *ngIf="isOpen">
    <div class="notif-panel-header">
      <span class="notif-panel-title">Notificaciones</span>
      <button class="notif-mark-all" (click)="marcarTodasLeidas()" *ngIf="noLeidas > 0">
        Marcar todas como leídas
      </button>
    </div>

    <div class="notif-list">
      <div
        *ngFor="let notif of notificaciones"
        class="notif-item"
        [class.unread]="!notif.leida"
        (click)="marcarLeida(notif, $event)"
      >
        <span class="notif-dot" *ngIf="!notif.leida"></span>
        <p class="notif-mensaje">{{ notif.mensaje }}</p>
        <span class="notif-fecha">{{ notif.fecha_creacion | date:'d MMM, HH:mm' }}</span>
      </div>

      <div class="notif-empty" *ngIf="notificaciones.length === 0">
        <span>Sin notificaciones</span>
      </div>
    </div>
  </div>
</div>
