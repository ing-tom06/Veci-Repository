<div class="page-title">
  <h2>Editar Perfil</h2>
</div>
<div class="form-container">
  <div *ngIf="loading" class="loading">Cargando...</div>

  <form *ngIf="!loading" [formGroup]="perfilForm" (ngSubmit)="onSubmit()" class="solicitud-form">
    
    <div class="profile-photo-container">
      <img [src]="imagePreview || 'assets/default-avatar.png'" alt="Foto de perfil" class="profile-photo-preview">
      <div class="form-group">
        <label for="foto_perfil">Cambiar foto de perfil</label>
        <input type="file" id="foto_perfil" (change)="onFileSelected($event)" accept="image/*" class="form-control file-input">
      </div>
      
      <div class="profile-rating-badge" *ngIf="promedioCalificaciones !== null">
        <span class="rating-star">★</span>
        <span class="rating-label">Calificación:</span>
        <span class="rating-value">{{ promedioCalificaciones > 0 ? (promedioCalificaciones | number:'1.1-1') : '0.0' }}</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" formControlName="nombre" class="form-control">
      </div>
      <div class="form-group">
        <label for="apellido">Apellido *</label>
        <input type="text" id="apellido" formControlName="apellido" class="form-control">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="correo">Correo</label>
        <input type="email" id="correo" formControlName="correo" class="form-control" readonly>
      </div>
      <div class="form-group">
        <label for="rol">Rol</label>
        <input type="text" id="rol" formControlName="rol" class="form-control" readonly>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="edad">Edad</label>
        <input type="number" id="edad" formControlName="edad" class="form-control">
      </div>
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" formControlName="telefono" class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label for="documento_identidad">Documento de Identidad</label>
      <input type="text" id="documento_identidad" formControlName="documento_identidad" class="form-control">
    </div>

    <button type="submit" class="btn-primary" [disabled]="perfilForm.invalid || submitting">
      {{ submitting ? 'Guardando...' : 'Guardar cambios' }}
    </button>
  </form>
</div>
